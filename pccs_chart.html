<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCCS トーンマップ カラーチャート</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --accent: #e94560;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
/* ===== Main Layout ===== */
.main-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  max-width: 1400px;
  height: 100%;
  margin: 0 auto;
}

/* ===== Neutral Strip ===== */
.neutral-strip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 8px;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  min-width: 60px;
  flex-shrink: 0;
}
.neutral-strip-title {
  font-size: 0.65rem;
  color: var(--text2);
  margin-bottom: 4px;
  writing-mode: horizontal-tb;
  white-space: nowrap;
}
.neutral-cell {
  width: 36px;
  height: 18px;
  border-radius: 3px;
  cursor: grab;
  transition: box-shadow 0.15s;
  position: relative;
}
.neutral-cell:hover {
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
  z-index: 100;
}
.neutral-label {
  font-size: 0.5rem;
  color: var(--text2);
  text-align: center;
  line-height: 1;
}

/* ===== Tone Map Grid ===== */
.tone-map {
  position: relative;
  width: 1200px;
  height: 100vh;
  flex-shrink: 0;
}

/* ===== Tone Ring ===== */
.tone-ring {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tone-ring-label {
  position: absolute;
  left: 0;
  top: 0;
  transform: translate(-50%, -50%);
  font-size: 0.85rem;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  z-index: 10;
  pointer-events: none;
  text-align: center;
  line-height: 1.1;
}
.tone-ring-sublabel {
  font-size: 0.55rem;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  display: block;
}
.hue-dot {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: grab;
  transition: box-shadow 0.12s ease;
}
.hue-dot:hover {
  box-shadow: 0 0 14px rgba(255,255,255,0.5);
  z-index: 200;
}
.hue-dot.interpolated {
  border-style: dashed;
  border-color: rgba(255,255,255,0.3);
}

/* ===== Tooltip ===== */
.tooltip {
  position: fixed;
  display: none;
  background: rgba(10, 10, 25, 0.96);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 16px;
  z-index: 9999;
  pointer-events: none;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  min-width: 200px;
  max-width: 280px;
}
.tooltip-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.tooltip-swatch {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.tooltip-title {
  font-size: 0.95rem;
  font-weight: 700;
}
.tooltip-subtitle {
  font-size: 0.7rem;
  color: var(--text2);
}
.tooltip-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  padding: 2px 0;
}
.tooltip-label {
  color: var(--text2);
}
.tooltip-value {
  font-family: 'Consolas', 'Courier New', monospace;
  color: var(--text);
}
.tooltip-copy-hint {
  text-align: center;
  font-size: 0.65rem;
  color: var(--accent);
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.tooltip-interp {
  font-size: 0.6rem;
  color: #f0a030;
  text-align: center;
  margin-top: 4px;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #fff;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 0.8rem;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 10000;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}



/* ===== Hue Number Labels (outer ring) ===== */
.hue-numbers {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

    
</style>
</head>
<body>
<div class="main-container">
  <!-- Neutral Strip -->
  <div class="neutral-strip" id="neutralStrip">
    <div class="neutral-strip-title">無彩色 (Neutral)</div>
  </div>

  <!-- Tone Map -->
  <div class="tone-map" id="toneMap">

  </div>
</div>

<div class="tooltip" id="tooltip"></div>

// ===== Tone Map Layout =====
// Positions: [x%, y%] in the tone map area
// Based on PCCS tone concept diagram:
//   High lightness top, Low lightness bottom
//   Low saturation left, High saturation right
// Tone positions: [x%, y%] — columns & rows aligned to grid
// Columns: 15%, 35%, 55%, 84% (gap: 20, 20, 29 — v↔s wider)
// Rows: 15%, 38%, 62%, 85%, b/s/dp at 27%/50%/73%
const TONE_POSITIONS = {
  p:   [15, 15],
  lt:  [35, 15],
  b:   [55, 27],
  ltg: [15, 38],
  sf:  [35, 38],
  s:   [55, 50],
  v:   [84, 50],
  g:   [15, 62],
  d:   [35, 62],
  dp:  [55, 73],
  dkg: [15, 85],
  dk:  [35, 85]
};

const TONE_NAMES = {
  v: ['vivid', 'ビビッド'], b: ['bright', 'ブライト'],
  s: ['strong', 'ストロング'], dp: ['deep', 'ディープ'],
  lt: ['light', 'ライト'], sf: ['soft', 'ソフト'],
  d: ['dull', 'ダル'], dk: ['dark', 'ダーク'],
  p: ['pale', 'ペール'], ltg: ['light grayish', 'ライトグレイッシュ'],
  g: ['grayish', 'グレイッシュ'], dkg: ['dark grayish', 'ダークグレイッシュ']
};

const HUE_RING_RADIUS = 85;
const V_RING_RADIUS = 135;
const DOT_SIZE = 32;

// ===== Build Color Lookup =====
const colorMap = {};
PCCS_DATA.colors.forEach(c => {
  colorMap[c.id] = c;
});

// ===== Render Neutral Strip =====
function renderNeutrals() {
  const strip = document.getElementById('neutralStrip');
  const neutrals = PCCS_DATA.colors.filter(c => c.tone === 'neutral' && c.neutralLevel % 1 !== 0)
    .sort((a, b) => b.neutralLevel - a.neutralLevel);

  neutrals.forEach(c => {
    const label = document.createElement('div');
    label.className = 'neutral-label';
    label.textContent = c.neutralLevel >= 9.5 ? 'W' : c.neutralLevel <= 1.5 ? 'Bk' : c.neutralLevel.toFixed(1);

    const cell = document.createElement('div');
    cell.className = 'neutral-cell';
    cell.style.backgroundColor = c.hex;
    cell.dataset.colorId = c.id;

    cell.addEventListener('mouseenter', e => showTooltip(e, c));
    cell.addEventListener('mouseleave', hideTooltip);
    cell.addEventListener('mousemove', moveTooltip);
    cell.addEventListener('click', () => copyColor(c.hex));

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = 'center';
    wrapper.style.gap = '1px';
    wrapper.appendChild(label);
    wrapper.appendChild(cell);
    strip.appendChild(wrapper);
  });
}

// ===== Render Tone Rings =====
function renderToneRings() {
  const map = document.getElementById('toneMap');

  Object.entries(TONE_POSITIONS).forEach(([tone, [xPct, yPct]]) => {
    const ring = document.createElement('div');
    ring.className = 'tone-ring';
    ring.style.left = xPct + '%';
    ring.style.top = yPct + '%';
    ring.style.width = '0';
    ring.style.height = '0';

    // Center label
    const label = document.createElement('div');
    label.className = 'tone-ring-label';
    const names = TONE_NAMES[tone];
    label.textContent = tone;
    const sub = document.createElement('span');
    sub.className = 'tone-ring-sublabel';
    sub.textContent = names[1];
    label.appendChild(sub);
    ring.appendChild(label);

    // 24 hue dots
    for (let hue = 1; hue <= 24; hue++) {
      const colorId = tone + hue;
      const c = colorMap[colorId];
      if (!c) continue;
      if (c.interpolated) continue;

      const radius = (tone === 'v') ? V_RING_RADIUS : HUE_RING_RADIUS;
      const angle = ((hue - 1) * 15 - 90) * Math.PI / 180;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;

      const dot = document.createElement('div');
      dot.className = 'hue-dot' + (c.interpolated ? ' interpolated' : '');
      dot.style.backgroundColor = c.hex;
      dot.style.left = (x - DOT_SIZE / 2) + 'px';
      dot.style.top = (y - DOT_SIZE / 2) + 'px';
      dot.dataset.colorId = c.id;

      dot.addEventListener('mouseenter', e => showTooltip(e, c));
      dot.addEventListener('mouseleave', hideTooltip);
      dot.addEventListener('mousemove', moveTooltip);
      dot.addEventListener('click', () => copyColor(c.hex));

      ring.appendChild(dot);
    }

    map.appendChild(ring);
  });
}

// ===== Tooltip =====
const tooltip = document.getElementById('tooltip');

function showTooltip(e, c) {
  if (typeof dragEl !== 'undefined' && dragEl) return;
  const isNeutral = c.tone === 'neutral';
  const toneName = isNeutral ? '無彩色' : (TONE_NAMES[c.tone] || ['',''])[1];
  const title = isNeutral ? c.hueName : c.id.toUpperCase();
  const subtitle = isNeutral
    ? 'Neutral ' + c.neutralLevel
    : toneName + ' / ' + c.hue + ':' + c.hueName;

  tooltip.textContent = '';
  const header = document.createElement('div');
  header.className = 'tooltip-header';
  const swatch = document.createElement('div');
  swatch.className = 'tooltip-swatch';
  swatch.style.backgroundColor = c.hex;
  const info = document.createElement('div');
  const titleEl = document.createElement('div');
  titleEl.className = 'tooltip-title';
  titleEl.textContent = title;
  const subEl = document.createElement('div');
  subEl.className = 'tooltip-subtitle';
  subEl.textContent = subtitle;
  info.appendChild(titleEl);
  info.appendChild(subEl);
  header.appendChild(swatch);
  header.appendChild(info);
  tooltip.appendChild(header);

  function addRow(label, value) {
    const row = document.createElement('div');
    row.className = 'tooltip-row';
    const lbl = document.createElement('span');
    lbl.className = 'tooltip-label';
    lbl.textContent = label;
    const val = document.createElement('span');
    val.className = 'tooltip-value';
    val.textContent = value;
    row.appendChild(lbl);
    row.appendChild(val);
    tooltip.appendChild(row);
  }
  addRow('HEX', c.hex);
  addRow('RGB', c.rgb.r + ', ' + c.rgb.g + ', ' + c.rgb.b);
  if (c.cmyk) {
    addRow('CMYK', c.cmyk.c + ', ' + c.cmyk.m + ', ' + c.cmyk.y + ', ' + c.cmyk.k);
  }
  const hint = document.createElement('div');
  hint.className = 'tooltip-copy-hint';
  hint.textContent = 'クリックでHEXをコピー';
  tooltip.appendChild(hint);
  if (c.interpolated) {
    const interp = document.createElement('div');
    interp.className = 'tooltip-interp';
    interp.textContent = '⚠ 補間値（隣接色の平均）';
    tooltip.appendChild(interp);
  }

  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 15;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - pad;
  x = Math.max(0, x);
  y = Math.max(0, y);
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ===== Copy =====
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function copyColor(hex) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(hex).then(() => {
      showToast(hex + ' をコピーしました!');
    }).catch(() => {
      fallbackCopy(hex);
    });
  } else {
    fallbackCopy(hex);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(ta);
  try {
    ta.select();
    document.execCommand('copy');
    showToast(text + ' をコピーしました!');
  } catch (e) {
    showToast('コピーに失敗しました');
  } finally {
    document.body.removeChild(ta);
  }
}

    const angle = (i * 45 - 90) * Math.PI / 180;
    const x = Math.cos(angle) * HUE_RING_RADIUS;
    const y = Math.sin(angle) * HUE_RING_RADIUS;

    const dot = document.createElement('div');
    dot.className = 'hue-dot';
    dot.style.backgroundColor = c.hex;
    if (c.hex === '#FFFFFF') {
      dot.style.border = '2px solid rgba(200,200,200,0.6)';
    }
    dot.style.left = (x - DOT_SIZE / 2) + 'px';
    dot.style.top = (y - DOT_SIZE / 2) + 'px';

    dot.addEventListener('mouseenter', e => showRicohTooltip(e, c));
    dot.addEventListener('mouseleave', hideTooltip);
    dot.addEventListener('mousemove', moveTooltip);
    dot.addEventListener('click', () => copyColor(c.hex));

    ring.appendChild(dot);
  });

  map.appendChild(ring);
}

// ===== Init =====
renderNeutrals();
renderToneRings();
renderRicohRing();

// ===== Interactive: Drag & Scroll Resize =====
let dragEl = null, dragStartX, dragStartY, dragBaseDx, dragBaseDy;
let hasDragged = false;

function getTS(el) {
  return {
    dx: parseFloat(el.dataset.dx || 0),
    dy: parseFloat(el.dataset.dy || 0),
    scale: parseFloat(el.dataset.scale || 1)
  };
}
function applyTS(el) {
  const s = getTS(el);
  el.style.transform = 'translate(' + s.dx + 'px,' + s.dy + 'px) scale(' + s.scale + ')';
}

document.addEventListener('mousedown', function(e) {
  var el = e.target.closest('.hue-dot, .neutral-cell');
  if (!el) return;
  e.preventDefault();
  dragEl = el;
  hasDragged = false;
  var s = getTS(el);
  dragBaseDx = s.dx;
  dragBaseDy = s.dy;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  el.style.zIndex = '500';
  el.style.cursor = 'grabbing';
  hideTooltip();
});

document.addEventListener('mousemove', function(e) {
  if (!dragEl) return;
  var dx = e.clientX - dragStartX;
  var dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasDragged = true;
  if (!hasDragged) return;
  dragEl.dataset.dx = dragBaseDx + dx;
  dragEl.dataset.dy = dragBaseDy + dy;
  applyTS(dragEl);
  hideTooltip();
});

document.addEventListener('mouseup', function() {
  if (dragEl) {
    dragEl.style.cursor = 'grab';
    if (!hasDragged) dragEl.style.zIndex = '';
    dragEl = null;
  }
});

document.addEventListener('click', function(e) {
  if (hasDragged) {
    e.stopPropagation();
    e.preventDefault();
    hasDragged = false;
  }
}, true);

document.addEventListener('wheel', function(e) {
  var el = e.target.closest('.hue-dot, .neutral-cell');
  if (!el) return;
  e.preventDefault();
  var s = getTS(el);
  var delta = e.deltaY > 0 ? -0.15 : 0.15;
  el.dataset.scale = Math.max(0.3, Math.min(5, s.scale + delta));
  applyTS(el);
}, { passive: false });
</script>
